<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div id="box">
            <h1 id="title">Generate a <br>random password</h1>
            <h4 id="subtitle">Never use an insecure password again.</h4>
            <button id="generate-btn" onclick="generate()">Generate passwords</button>
            <button id="reset-btn" onclick="reset()">Reset</button>
            <hr>
            <div id="outputs">
                <div id="password-one" onclick="copy(this)"></div>
                <div id="password-two" onclick="copy(this)"></div>
            </div>
        </div>
        <script src="./index.js"></script>
    </body>
</html>
